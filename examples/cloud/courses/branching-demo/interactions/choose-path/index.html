<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose path</title>
  <style>
    :root {
      color-scheme: light;
      --lab-bg: #f8fafc;
      --lab-surface: #fff;
      --lab-text: #0f172a;
      --lab-muted: #64748b;
      --lab-border: #e2e8f0;
      --lab-accent: #2563eb;
      --lab-radius: 12px;
      --lab-font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0 auto;
      max-width: 32rem;
      padding: 2rem 1.5rem;
      font-family: var(--lab-font);
      background: var(--lab-bg);
      color: var(--lab-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.35rem; font-weight: 700; }
    p { margin: 0 0 1.25rem; color: var(--lab-muted); }
    .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    button {
      padding: 0.65rem 1.25rem;
      font: inherit;
      font-size: 0.9375rem;
      border-radius: var(--lab-radius);
      border: 1px solid var(--lab-border);
      background: var(--lab-surface);
      color: var(--lab-text);
      cursor: pointer;
      box-shadow: 0 1px 2px rgb(15 23 42 / 6%);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    button:hover, button:focus-visible {
      border-color: var(--lab-accent);
      outline: none;
      box-shadow: 0 4px 14px rgb(37 99 235 / 12%);
    }
    #advanced {
      background: var(--lab-accent);
      border-color: var(--lab-accent);
      color: #fff;
      font-weight: 600;
    }
    #advanced:hover, #advanced:focus-visible {
      filter: brightness(1.05);
    }
  </style>
</head>
<body>
  <h1>Choose your path</h1>
  <p>Pick a learning path to continue the course.</p>
  <div class="actions">
    <button type="button" id="basic">Basic path</button>
    <button type="button" id="advanced">Advanced path</button>
  </div>
  <script>
    document.getElementById("basic").onclick = () => {
      window.parent.lxpack?.setVariable("path", "intro");
      window.parent.lxpack?.track({ type: "interaction", id: "choose_path", data: { path: "basic" } });
    };
    document.getElementById("advanced").onclick = () => {
      window.parent.lxpack?.setVariable("path", "advanced");
      window.parent.lxpack?.track({ type: "interaction", id: "choose_path", data: { path: "advanced" } });
    };
  </script>
</body>
</html>
